name: CI Pipeline - GanttProject

on:
  push:
    branches: [ master, develop, feature/ci-pipeline ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build non-UI modules
        run: ./gradlew :biz.ganttproject.core:check :ganttproject-builder:build -x compileKotlin -x test
        continue-on-error: true

      - name: Run available tests
        run: ./gradlew test -x :ganttproject:test --continue
        continue-on-error: true

      - name: Checkstyle - analyse statique
        run: ./gradlew checkstyleMain --continue
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/reports/tests/'

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-reports
          path: '**/build/reports/'

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          find . -name "*.java" | xargs wc -l 2>/dev/null | tail -1 || echo "Java LOC counted"
          find . -name "*.kt" | xargs wc -l 2>/dev/null | tail -1 || echo "Kotlin LOC counted"

      - name: Check test coverage ratio
        run: |
          MAIN=$(find . -name "*.java" -o -name "*.kt" | grep -v "[Tt]est" | grep "src/main" | wc -l)
          TEST=$(find . -name "*.java" -o -name "*.kt" | grep -i "[Tt]est" | wc -l)
          echo "Main source files: $MAIN"
          echo "Test files: $TEST"
          echo "Test ratio: $(echo "scale=2; $TEST * 100 / $MAIN" | bc)%"